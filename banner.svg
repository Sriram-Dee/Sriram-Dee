<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="60%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>

    <!-- Glowing Circle Gradients -->
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="glow-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#334155" stroke-width="0.5" stroke-opacity="0.3"/>
    </pattern>

    <!-- Blur Filter for Glows -->
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)"/>
  
  <!-- Grid -->
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Glows -->
  <circle cx="100" cy="50" r="150" fill="url(#glow-cyan)" filter="url(#blur)"/>
  <circle cx="700" cy="190" r="180" fill="url(#glow-purple)" filter="url(#blur)"/>

  <!-- Tech Lines & Circles -->
  <g stroke="#4f46e5" stroke-width="1" opacity="0.3">
    <circle cx="680" cy="120" r="60" fill="none" stroke-dasharray="10 10"/>
    <circle cx="680" cy="120" r="45" fill="none" stroke-dasharray="5 5"/>
    <circle cx="680" cy="120" r="15" fill="#6366f1" fill-opacity="0.2"/>
    <circle cx="680" cy="120" r="5" fill="#818cf8"/>
    
    <line x1="680" y1="120" x2="620" y2="120" />
    <line x1="620" y1="120" x2="600" y2="140" />
    
    <circle cx="600" cy="140" r="3" fill="#818cf8"/>
  </g>

  <!-- Floating Brackets -->
  <text x="50" y="85" fill="#334155" font-family="monospace" font-size="24" font-weight="bold" opacity="0.4">&lt;code&gt;</text>
  <text x="540" y="185" fill="#334155" font-family="monospace" font-size="24" font-weight="bold" opacity="0.4">&lt;/code&gt;</text>

  <!-- Content Group -->
  <g transform="translate(60, 0)">
    <!-- Subtitle/Greeting -->
    <text x="0" y="70" fill="#818cf8" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="3">HELLO WORLD, I'M</text>
    
    <!-- Main Name -->
    <text x="0" y="120" fill="url(#text-gradient)" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" letter-spacing="-1">Sriram R</text>
    
    <!-- Title / Description -->
    <text x="0" y="155" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400">Full-Stack MERN Developer &amp; Tech Enthusiast</text>

    <!-- Badges (Pills) -->
    <!-- React -->
    <g transform="translate(0, 180)">
      <rect width="70" height="24" rx="12" fill="#1e1b4b" stroke="#312e81" stroke-width="1"/>
      <text x="35" y="16" fill="#c7d2fe" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">React.js</text>
    </g>
    <!-- Node.js -->
    <g transform="translate(78, 180)">
      <rect width="70" height="24" rx="12" fill="#1e1b4b" stroke="#312e81" stroke-width="1"/>
      <text x="35" y="16" fill="#c7d2fe" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Node.js</text>
    </g>
    <!-- Express -->
    <g transform="translate(156, 180)">
      <rect width="78" height="24" rx="12" fill="#1e1b4b" stroke="#312e81" stroke-width="1"/>
      <text x="39" y="16" fill="#c7d2fe" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Express.js</text>
    </g>
    <!-- MongoDB -->
    <g transform="translate(242, 180)">
      <rect width="80" height="24" rx="12" fill="#1e1b4b" stroke="#312e81" stroke-width="1"/>
      <text x="40" y="16" fill="#c7d2fe" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">MongoDB</text>
    </g>
    <!-- Redux -->
    <g transform="translate(330, 180)">
      <rect width="65" height="24" rx="12" fill="#1e1b4b" stroke="#312e81" stroke-width="1"/>
      <text x="32.5" y="16" fill="#c7d2fe" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Redux</text>
    </g>
  </g>
</svg>
