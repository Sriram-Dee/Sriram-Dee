<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 280" width="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#050d1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7b2ff7"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#a0c4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,212,255,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="860" height="280" fill="url(#bg)"/>
  <rect width="860" height="280" fill="url(#grid)"/>

  <circle cx="720" cy="60" r="120" fill="none" stroke="rgba(123,47,247,0.15)" stroke-width="1"/>
  <circle cx="720" cy="60" r="90" fill="none" stroke="rgba(0,212,255,0.12)" stroke-width="1"/>
  <circle cx="720" cy="60" r="60" fill="none" stroke="rgba(255,107,107,0.10)" stroke-width="1"/>
  <circle cx="720" cy="60" r="200" fill="none" stroke="rgba(123,47,247,0.07)" stroke-width="1"/>

  <circle cx="730" cy="55" r="55" fill="rgba(123,47,247,0.18)" filter="url(#glow2)"/>
  <circle cx="780" cy="160" r="35" fill="rgba(0,212,255,0.12)" filter="url(#glow2)"/>
  <circle cx="650" cy="200" r="25" fill="rgba(255,107,107,0.10)" filter="url(#glow2)"/>

  <text x="620" y="80" font-family="monospace" font-size="18" fill="rgba(0,212,255,0.3)" filter="url(#glow)">&lt;/&gt;</text>
  <text x="780" y="100" font-family="monospace" font-size="14" fill="rgba(123,47,247,0.4)" filter="url(#glow)">{ }</text>
  <text x="700" y="220" font-family="monospace" font-size="12" fill="rgba(255,107,107,0.35)" filter="url(#glow)">=&gt;</text>
  <text x="800" y="50" font-family="monospace" font-size="11" fill="rgba(0,212,255,0.25)">npm</text>
  <text x="640" y="150" font-family="monospace" font-size="10" fill="rgba(123,47,247,0.3)">API</text>
  <text x="820" y="200" font-family="monospace" font-size="10" fill="rgba(255,107,107,0.25)">git</text>

  <rect x="0" y="0" width="860" height="3" fill="url(#accent)"/>

  <text x="52" y="78" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="rgba(0,212,255,0.9)" font-weight="500" filter="url(#glow)">Hello World! I'm</text>
  <text x="50" y="138" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="46" fill="url(#text-grad)" font-weight="800" filter="url(#glow)">Sriram R</text>

  <rect x="50" y="152" width="260" height="30" rx="15" fill="rgba(0,212,255,0.12)" stroke="rgba(0,212,255,0.4)" stroke-width="1"/>
  <text x="180" y="172" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle" font-weight="600">Full-Stack MERN Developer</text>

  <rect x="50" y="196" width="60" height="22" rx="11" fill="rgba(97,218,251,0.15)" stroke="rgba(97,218,251,0.5)" stroke-width="1"/>
  <text x="80" y="211" font-family="monospace" font-size="11" fill="#61DAFB" text-anchor="middle">React</text>

  <rect x="118" y="196" width="65" height="22" rx="11" fill="rgba(51,153,51,0.15)" stroke="rgba(51,153,51,0.5)" stroke-width="1"/>
  <text x="150" y="211" font-family="monospace" font-size="11" fill="#339933" text-anchor="middle">Node.js</text>

  <rect x="191" y="196" width="75" height="22" rx="11" fill="rgba(71,162,72,0.15)" stroke="rgba(71,162,72,0.5)" stroke-width="1"/>
  <text x="228" y="211" font-family="monospace" font-size="11" fill="#47A248" text-anchor="middle">MongoDB</text>

  <rect x="274" y="196" width="68" height="22" rx="11" fill="rgba(0,0,0,0.25)" stroke="rgba(200,200,200,0.4)" stroke-width="1"/>
  <text x="308" y="211" font-family="monospace" font-size="11" fill="#eeeeee" text-anchor="middle">Next.js</text>

  <circle cx="46" cy="248" r="5" fill="#00ff88">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="56" y="252" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="rgba(160,196,255,0.7)">Cuddalore, TN  |  HEPL  |  Open to opportunities</text>

  <rect x="0" y="277" width="860" height="3" fill="url(#accent)"/>
</svg>
